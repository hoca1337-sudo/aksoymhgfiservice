<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKSYMH TOOL PANEL</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f1a;color:white;text-align:center;}

.box{
background:#111827;
padding:20px;
border-radius:10px;
margin:10px auto;
max-width:400px;
}

input{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#00ffcc;
cursor:pointer;
}

.page{display:none;}
.active{display:block;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page active">
<div class="box">
<h2>Giriş Yap</h2>
<input id="user" placeholder="Kullanıcı">
<input id="pass" placeholder="Şifre">
<br>
<button onclick="login()">Giriş</button>
</div>
</div>

<!-- PANEL -->
<div id="panel" class="page">

<h2>🚀 TOOL PANEL</h2>

<div class="box">
<p>💰 Bakiye: <span id="balance">0</span> TL</p>
<button onclick="addBalance()">+100 TL Ekle</button>
</div>

<div class="box">
<h3>Servisler</h3>

<button onclick="order('CPID')">Samsung CPID</button>
<button onclick="order('FRP')">Remote FRP</button>
<button onclick="order('KG')">KG Service</button>

</div>

<div class="box">
<h3>IMEI / Model</h3>
<input id="imei" placeholder="IMEI veya model">
<button onclick="sendOrder()">Sipariş Ver</button>
</div>

<button onclick="logout()">Çıkış</button>

</div>

<script>

let selectedService = "";

// LOGIN
function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u === "admin" && p === "1234"){
document.getElementById("login").classList.remove("active");
document.getElementById("panel").classList.add("active");
loadBalance();
}else{
alert("Hatalı giriş");
}
}

// LOGOUT
function logout(){
location.reload();
}

// BAKİYE
function loadBalance(){
let b = localStorage.getItem("balance") || 0;
document.getElementById("balance").innerText = b;
}

function addBalance(){
let b = parseInt(localStorage.getItem("balance") || 0);
b += 100;
localStorage.setItem("balance", b);
loadBalance();
}

// SERVİS SEÇ
function order(type){
selectedService = type;
alert(type + " seçildi");
}

// SİPARİŞ
function sendOrder(){
let imei = document.getElementById("imei").value;

if(!selectedService){
alert("Servis seç");
return;
}

let msg = "Servis: " + selectedService + " IMEI: " + imei;
window.open("https://wa.me/905447447798?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
