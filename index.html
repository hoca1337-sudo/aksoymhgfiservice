<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKSYMH GFI SERVICE</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

/* HEADER */
header{
background:#111827;
padding:15px;
font-size:20px;
font-weight:bold;
text-align:center;
color:#00ffcc;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:#111827;
padding:20px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
border:1px solid #00ffcc33;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffcc;
}

/* PANEL */
.panel{
display:none;
padding:20px;
}

.box{
background:#111827;
padding:20px;
border-radius:10px;
margin:10px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#00ffcc;
cursor:pointer;
margin-top:10px;
}

</style>
</head>

<body>

<header>AKSYMH GFI SERVICE PANEL</header>

<!-- SERVİSLER -->
<div class="grid">

<div class="card" onclick="openPanel('samsung')">📱 Samsung CPID</div>
<div class="card">🍎 iPhone Servis</div>
<div class="card">🔧 Android Yazılım</div>
<div class="card">📶 Şebeke</div>
<div class="card">🔓 Kilit Açma</div>

</div>

<!-- SAMSUNG PANEL -->
<div id="samsung" class="panel">

<div class="box">
<h2>Samsung CPID Fiyat Listesi</h2>

<p>S23 → 10.500 TL</p>
<p>S24 Ultra → 15.000 TL</p>
<p>S25 Ultra → 18.000 TL</p>

<button onclick="goWhats()">WhatsApp Sipariş</button>
<button onclick="closePanel()">Geri</button>

</div>

</div>

<script>

function openPanel(id){
document.getElementById(id).style.display="block";
window.scrollTo(0,document.body.scrollHeight);
}

function closePanel(){
document.getElementById("samsung").style.display="none";
}

function goWhats(){
window.open("https://wa.me/905447447798");
}

</script>

</body>
</html>
