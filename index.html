<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AksyMH Gfi Service</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(270deg,#000,#001a1a,#000);
background-size:600% 600%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

header{
font-size:34px;
padding:20px;
animation:rainbow 3s infinite;
}

@keyframes rainbow{
0%{color:#00ffcc}
25%{color:#ff00ff}
50%{color:#00ffff}
75%{color:#ffff00}
100%{color:#00ffcc}
}

input{
padding:15px;
width:260px;
border-radius:10px;
border:none;
}

button{
padding:15px 25px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffcc;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.2);
box-shadow:0 0 30px #00ffcc;
}

.services{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.box{
margin:10px;
padding:15px;
width:250px;
border-radius:12px;
cursor:pointer;
animation:neon 2s infinite alternate;
transition:0.3s;
}

.box:hover{
transform:scale(1.2) rotate(2deg);
}

@keyframes neon{
0%{box-shadow:0 0 10px #00ffcc}
25%{box-shadow:0 0 20px #ff00ff}
50%{box-shadow:0 0 30px #00ffff}
75%{box-shadow:0 0 40px #ffff00}
100%{box-shadow:0 0 50px #00ffcc}
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
padding:20px;
border-radius:10px;
box-shadow:0 0 40px #00ffcc;
width:300px;
z-index:1000;
}

.popup button{
background:red;
color:white;
}

.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:999;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
animation:shake 1s infinite;
}

@keyframes shake{
0%{transform:translateX(0)}
50%{transform:translateX(5px)}
100%{transform:translateX(0)}
}
</style>
</head>

<body>

<header>⚡ AKSYMH GFI SERVICE ⚡</header>

<h2>Profesyonel Teknik Servis</h2>

<input id="imei" placeholder="IMEI gir">
<br>
<button onclick="check()">Sorgula</button>

<p id="result"></p>

<div class="services">

<div class="box" onclick="openPopup('Android yazılım cihazın sistemini sıfırlar ve hızlandırır.')">📱 Android Yazılım</div>
<div class="box" onclick="openPopup('iOS cihazlar için özel servis işlemleri yapılır.')">🍎 iOS Servis</div>
<div class="box" onclick="openPopup('Şarj entegre arızaları çözülür.')">🔌 Şarj Entegre</div>
<div class="box" onclick="openPopup('CPU yeniden lehimlenir.')">🔥 CPU Reball</div>
<div class="box" onclick="openPopup('Anakart tamiri yapılır.')">🛠️ Anakart</div>
<div class="box" onclick="openPopup('Brick cihazlar kurtarılır.')">⚡ Hard Brick</div>

<div class="box" onclick="openPopup('FRP kilidi kaldırılır.')">🔓 FRP</div>
<div class="box" onclick="openPopup('Şifreli cihaz açılır.')">🔐 Kilit</div>
<div class="box" onclick="openPopup('Şebeke sorunları çözülür.')">📡 Şebeke</div>
<div class="box" onclick="openPopup('WiFi tamiri yapılır.')">📶 WiFi</div>
<div class="box" onclick="openPopup('Batarya değişimi yapılır.')">🔋 Batarya</div>
<div class="box" onclick="openPopup('Veriler kurtarılır.')">💾 Veri</div>

</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<div class="popup" id="popup">
<p id="popupText"></p>
<br>
<button onclick="closePopup()">Kapat</button>
</div>

<a class="whatsapp" href="https://wa.me/905447447798">💬</a>

<script>
function check(){
let imei=document.getElementById("imei").value;
let result=document.getElementById("result");

if(!imei||imei.length!==15){
result.innerHTML="❌ Geçersiz IMEI";
return;
}

let brand="Bilinmiyor";
if(imei.startsWith("35")) brand="Samsung";
else if(imei.startsWith("86")) brand="Xiaomi";
else if(imei.startsWith("01")) brand="Apple";

let status=(parseInt(imei)%2===0)?"Kayıtlı":"Kayıt Dışı";

result.innerHTML="📱 "+brand+"<br>🔒 "+status;
}

function openPopup(text){
document.getElementById("popupText").innerText=text;
document.getElementById("popup").style.display="block";
document.getElementById("overlay").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
document.getElementById("overlay").style.display="none";
}
</script>

</body>
</html>
