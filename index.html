<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AksyMH Gfi Service</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1518770660439-4636190af475');
background-size:cover;
background-attachment:fixed;
}

/* HEADER */
header{
font-size:32px;
padding:20px;
animation:rainbow 4s infinite;
}

@keyframes rainbow{
0%{color:#00ffcc}
25%{color:#ff00ff}
50%{color:#00ffff}
75%{color:#ffff00}
100%{color:#00ffcc}
}

input{
padding:15px;
width:260px;
border-radius:10px;
border:none;
}

button{
padding:15px 25px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffcc;
cursor:pointer;
font-weight:bold;
}

.services{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.box{
margin:10px;
padding:15px;
width:250px;
border-radius:12px;
cursor:pointer;
animation:neon 2s infinite alternate;
background:rgba(0,0,0,0.6);
}

@keyframes neon{
0%{box-shadow:0 0 10px #00ffcc}
25%{box-shadow:0 0 20px #ff00ff}
50%{box-shadow:0 0 30px #00ffff}
75%{box-shadow:0 0 40px #ffff00}
100%{box-shadow:0 0 50px #00ffcc}
}

.warning{color:red;font-size:12px;}

.section{margin-top:40px;}

/* POPUP */
.popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:black;
padding:20px;
border-radius:10px;
box-shadow:0 0 40px #00ffcc;
width:300px;
z-index:1000;
}

.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:999;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}

/* FAKE SALES */
.toast{
position:fixed;
bottom:80px;
left:20px;
background:black;
padding:10px;
border-radius:10px;
box-shadow:0 0 20px #00ffcc;
display:none;
}
</style>
</head>

<body>

<header>⚡ AKSYMH GFI SERVICE ⚡</header>

</div>

<div class="section">
<h2>⭐ Yorumlar</h2>
<p>⭐⭐⭐⭐⭐ “Çok iyi”</p>
<p>⭐⭐⭐⭐⭐ “Hızlı çözüm”</p>
<p>👍 10.000+ Beğeni</p>
</div>

<!-- POPUP -->
<div class="overlay" id="overlay"></div>
<div class="popup" id="popup">

<a href="https://wa.me/905447447798?text=Merhaba%20IMEI%20sorgu%20yaptım%20yardım%20istiyorum">
<button>WhatsApp Yaz</button>
</a>
<br><br>
<button onclick="closePopup()">Kapat</button>

<!-- FAKE SALES -->
<div class="toast" id="toast"></div>

<a class="whatsapp" href="https://wa.me/905447447798?text=Merhaba%20yardım%20istiyorum">💬</a>

<script>
function check(){
let imei=document.getElementById("imei").value;
let result=document.getElementById("result");

if(!imei||imei.length!==15){
result.innerHTML="❌ Geçersiz IMEI";
return;
}

let status=(parseInt(imei)%2===0)?"Kayıtlı":"Kayıt Dışı";
result.innerHTML="🔒 "+status;
}

// CANLI
setInterval(()=>{
document.getElementById("online").innerText=Math.floor(Math.random()*50)+10;
},2000);

// POPUP
setTimeout(()=>{
document.getElementById("popup").style.display="block";
document.getElementById("overlay").style.display="block";
},4000);

function closePopup(){
document.getElementById("popup").style.display="none";
document.getElementById("overlay").style.display="none";
}

// FAKE SATIŞ
let names=["Ahmet","Mehmet","Ali","Hasan","Emre","Burak"];
setInterval(()=>{
let toast=document.getElementById("toast");
let name=names[Math.floor(Math.random()*names.length)];
toast.innerHTML="🔥 "+name+" az önce işlem yaptırdı!";
toast.style.display="block";
setTimeout(()=>{toast.style.display="none"},3000);
},5000);
</script>

</body>
</html>
