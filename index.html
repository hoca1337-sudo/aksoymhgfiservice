<head>

<title>AKSYMH GFI SERVICE</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:#010101;
color:white;
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 30px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
color:#0ff;
font-size:20px;
text-shadow:0 0 10px #0ff;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

/* 🔥 HARF HARF NEON */
.neon span{
font-size:clamp(25px,6vw,70px);
color:#0ff;
display:inline-block;
animation:flicker 2s infinite;
}

/* HARF GECİKMESİ */
.neon span:nth-child(1){animation-delay:0.1s;}
.neon span:nth-child(2){animation-delay:0.2s;}
.neon span:nth-child(3){animation-delay:0.3s;}
.neon span:nth-child(4){animation-delay:0.4s;}
.neon span:nth-child(5){animation-delay:0.5s;}
.neon span:nth-child(6){animation-delay:0.6s;}
.neon span:nth-child(7){animation-delay:0.7s;}
.neon span:nth-child(8){animation-delay:0.8s;}
.neon span:nth-child(9){animation-delay:0.9s;}
.neon span:nth-child(10){animation-delay:1s;}
.neon span:nth-child(11){animation-delay:1.1s;}
.neon span:nth-child(12){animation-delay:1.2s;}
.neon span:nth-child(13){animation-delay:1.3s;}
.neon span:nth-child(14){animation-delay:1.4s;}
.neon span:nth-child(15){animation-delay:1.5s;}
.neon span:nth-child(16){animation-delay:1.6s;}
.neon span:nth-child(17){animation-delay:1.7s;}
.neon span:nth-child(18){animation-delay:1.8s;}

/* NEON EFFECT */
@keyframes flicker{
0%,18%,22%,25%,53%,57%,100%{
text-shadow:
0 0 5px #0ff,
0 0 10px #0ff,
0 0 20px #0ff,
0 0 40px #0ff,
0 0 80px #0ff;
opacity:1;
}
20%,24%,55%{
text-shadow:none;
opacity:0.3;
}
}

/* ALT YAZI */
.hero p{
margin-top:25px;
color:#aaa;
}

/* BUTON */
.btn{
margin-top:30px;
padding:15px 40px;
background:#0ff;
border:none;
border-radius:30px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
box-shadow:0 0 25px #0ff;
}

/* 🔥 İKON ANİMASYON */
.icon-left, .icon-right{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:50px;
color:#0ff;
animation:float 3s ease-in-out infinite;
}

.icon-left{left:5%;}
.icon-right{right:5%;}

@keyframes float{
0%,100%{transform:translateY(-50%) translateY(0);}
50%{transform:translateY(-50%) translateY(-20px);}
}

/* SERVICES */
.services{
padding:80px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:15px;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #0ff;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
font-size:22px;
cursor:pointer;
}

/* BG */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(#0ff2 1px,transparent 1px);
background-size:50px 50px;
animation:bgMove 10s linear infinite;
z-index:-1;
}

@keyframes bgMove{
from{transform:translateY(0);}
to{transform:translateY(50px);}
}

footer{
text-align:center;
padding:30px;
color:#666;
}
</style>

</head>

</html>
