<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKSYMH GFI SERVICE</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
scroll-behavior:smooth;
}

body{
background:#020202;
color:white;
overflow-x:hidden;
}

/* NAVBAR */
nav{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

/* 🔥 LOGO FIX */
.logo{
font-size:clamp(16px,2.5vw,24px);
color:#0ff;
white-space:nowrap; /* taşmayı önler */
text-shadow:
0 0 5px #0ff,
0 0 10px #0ff,
0 0 20px #0ff,
0 0 40px #0ff;
animation:logoGlow 2s infinite alternate;
}

@keyframes logoGlow{
from{
text-shadow:
0 0 5px #0ff,
0 0 10px #0ff;
}
to{
text-shadow:
0 0 10px #0ff,
0 0 25px #0ff,
0 0 50px #0ff;
}
}

nav a{
margin-left:20px;
color:white;
text-decoration:none;
}

/* HERO */
.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

/* 🔥 ULTRA NEON YAZI */
.neon{
font-size:clamp(28px,6vw,70px);
color:#0ff;
letter-spacing:3px;
animation:flicker 2s infinite;
}

/* 🔥 GERÇEK NEON FLICKER */
@keyframes flicker{
0%,18%,22%,25%,53%,57%,100%{
text-shadow:
0 0 5px #0ff,
0 0 10px #0ff,
0 0 20px #0ff,
0 0 40px #0ff,
0 0 80px #0ff;
opacity:1;
}
20%,24%,55%{
text-shadow:none;
opacity:0.4;
}
}

.hero p{
margin-top:20px;
color:#aaa;
}

.btn{
margin-top:30px;
padding:15px 40px;
background:#0ff;
border:none;
border-radius:30px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
box-shadow:0 0 20px #0ff;
}

/* SERVICES */
.services{
padding:80px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:15px;
transition:.3s;
}

.card i{
font-size:30px;
color:#0ff;
margin-bottom:10px;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px #0ff;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
font-size:22px;
cursor:pointer;
}

/* BG ANIM */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(#0ff2 1px,transparent 1px);
background-size:50px 50px;
animation:bgMove 10s linear infinite;
z-index:-1;
}

@keyframes bgMove{
from{transform:translateY(0);}
to{transform:translateY(50px);}
}

footer{
text-align:center;
padding:30px;
color:#666;
}
</style>

</head>

<body>

<nav>
<div class="logo">AKSYMH GFI SERVICE</div>
<div>
<a href="#">Ana Sayfa</a>
<a href="#">Servisler</a>
<a href="#">İletişim</a>
</div>
</nav>

<section class="hero">
<h1 class="neon">AKSYMH GFI SERVICE</h1>
<p>Android • iOS • FRP • Bootloop • Şebeke</p>
<button class="btn" onclick="wa()">WhatsApp Yaz</button>
</section>

<section class="services">
<h2>Hizmetlerimiz</h2>

<div class="grid">

<div class="card">
<i class="fa-brands fa-android"></i>
<h3>Android Yazılım</h3>
</div>

<div class="card">
<i class="fa-brands fa-apple"></i>
<h3>iOS Servis</h3>
</div>

<div class="card">
<i class="fa-solid fa-lock"></i>
<h3>FRP Açma</h3>
</div>

<div class="card">
<i class="fa-solid fa-microchip"></i>
<h3>Bootloop</h3>
</div>

<div class="card">
<i class="fa-solid fa-signal"></i>
<h3>Şebeke</h3>
</div>

</div>
</section>

<div class="whatsapp" onclick="wa()">
<i class="fa-brands fa-whatsapp"></i>
</div>

<footer>
© 2026 AKSYMH GFI SERVICE
</footer>

<script>
function wa(){
window.open("https://wa.me/905XXXXXXXXX","_blank");
}
</script>

</body>
</html>
