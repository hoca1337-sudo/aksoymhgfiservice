<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKSYMH GFI SERVICE</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{margin:0;background:#050505;color:white;font-family:Arial}
.center{text-align:center;padding:40px}
input,textarea{padding:10px;margin:5px;width:250px}
button{padding:10px 20px;background:#0ff;border:none;cursor:pointer}
.card{background:#111;padding:10px;margin:10px;border-radius:10px}
#admin{display:none;background:#000;padding:20px}
.neon{color:#0ff;text-shadow:0 0 10px #0ff}
.float{position:fixed;bottom:20px;right:20px}
</style>
</head>

<body>

<div class="center">
<h1 class="neon">AKSYMH GFI SERVICE</h1>

<button onclick="wa()">WhatsApp</button>
<button onclick="call()">Ara</button>

<h2>Yorumlar</h2>
<input id="yorumTxt" placeholder="Yorum yaz">
<button onclick="addYorum()">Ekle</button>

<div id="yorumlar"></div>

<hr>

<h2>İletişim</h2>
<input id="ad" placeholder="Ad">
<textarea id="mesaj" placeholder="Mesaj"></textarea>
<button onclick="sendMsg()">Gönder</button>

<hr>

<button onclick="showAdmin()">Admin Panel</button>
</div>

<!-- ADMIN PANEL -->
<div id="admin">
<h2>Admin Giriş</h2>
<input id="email" placeholder="mail">
<input id="pass" type="password">
<button onclick="login()">Giriş</button>

<div id="panel" style="display:none">
<h3>Yorum Yönet</h3>
<div id="adminYorum"></div>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 BURAYI DOLDUR */
const firebaseConfig = {
apiKey: "SENIN_KEY",
authDomain: "SENIN_DOMAIN",
projectId: "SENIN_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* YORUM EKLE */
window.addYorum = async () => {
let text=document.getElementById("yorumTxt").value;
await addDoc(collection(db,"yorumlar"),{text});
load();
};

/* MESAJ */
window.sendMsg = async () => {
let ad=document.getElementById("ad").value;
let mesaj=document.getElementById("mesaj").value;
await addDoc(collection(db,"mesajlar"),{ad,mesaj});
alert("Gönderildi");
};

/* YORUM YÜKLE */
async function load(){
let data=await getDocs(collection(db,"yorumlar"));
let html="";
let adminHTML="";

data.forEach(d=>{
html+=`<div class="card">${d.data().text}</div>`;
adminHTML+=`<div class="card">${d.data().text}
<button onclick="del('${d.id}')">Sil</button></div>`;
});

document.getElementById("yorumlar").innerHTML=html;
document.getElementById("adminYorum").innerHTML=adminHTML;
}

window.del = async(id)=>{
await deleteDoc(doc(db,"yorumlar",id));
load();
};

/* LOGIN */
window.login = async ()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("pass").value;

await signInWithEmailAndPassword(auth,email,pass);

document.getElementById("panel").style.display="block";
};

/* ADMIN GÖSTER */
window.showAdmin=()=>{
document.getElementById("admin").style.display="block";
};

load();

</script>

<script>
function wa(){window.open("https://wa.me/905XXXXXXXXX")}
function call(){window.open("tel:05XXXXXXXXX")}
</script>

</body>
</html>
