<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AksyMH Gfi Service</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
url('https://images.unsplash.com/photo-1518770660439-4636190af475');
background-size:cover;
}

/* HEADER */
header{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
padding:25px;
}

.logo{
font-size:42px;
font-weight:900;
animation:neon 2s infinite alternate;
}

@keyframes neon{
0%{color:#00ffcc;text-shadow:0 0 10px #00ffcc;}
50%{color:#ff00ff;text-shadow:0 0 20px #ff00ff;}
100%{color:#00ffff;text-shadow:0 0 30px #00ffff;}
}

/* FORM */
input,button,select{
padding:12px;
margin:5px;
border-radius:10px;
border:none;
}

button{
background:#00ffcc;
font-weight:bold;
cursor:pointer;
}

/* CARDS */
.card{
margin:20px auto;
padding:20px;
width:90%;
max-width:500px;
border-radius:20px;
background:rgba(255,255,255,0.05);
box-shadow:0 0 20px #00ffcc;
}

/* SERVICES */
.services{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.box{
margin:10px;
padding:12px;
width:200px;
background:rgba(0,0,0,0.6);
border-radius:10px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}
</style>
</head>

<body>

<header>
<span>🛠️</span>
<span class="logo">AKSYMH GFI SERVICE</span>
<span>💻</span>
</header>

<select onchange="changeLang(this.value)">
<option value="tr">TR</option>
<option value="en">EN</option>
</select>

<h2 data-key="title">Profesyonel Teknik Servis</h2>

<!-- IMEI -->
<input id="imei" placeholder="IMEI gir">
<br>
<button onclick="sendWhatsApp()" data-key="btn">Sorgula & İletişime Geç</button>

<p id="result"></p>

<!-- SERVICES -->
<div class="services">
<div class="box" data-key="s1">Android Yazılım</div>
<div class="box" data-key="s2">iOS Servis</div>
<div class="box" data-key="s3">Anakart Onarım</div>
<div class="box" data-key="s4">Veri Kurtarma</div>
</div>

<!-- FORM -->
<div class="card">
<h3 data-key="form">Hızlı Talep</h3>
<input id="ad" placeholder="Ad">
<input id="tel" placeholder="Telefon">
<br>
<button onclick="formGonder()" data-key="send">Gönder</button>
</div>

<!-- LIVE -->
<div class="card">
<h3 data-key="live">Canlı Kullanıcı</h3>
<p>👁️ <span id="online">0</span></p>
</div>

<!-- ABOUT -->
<div class="card">
<h3 data-key="about">Biz Kimiz</h3>
<p data-key="aboutText">Profesyonel teknik servis hizmeti sunuyoruz.</p>
</div>

<!-- PAYMENT -->
<div class="card">
<h3 data-key="pay">Ödeme</h3>
<button onclick="goWhats()" data-key="paybtn">WhatsApp</button>
</div>

<footer>
<p>© 2026 AksyMH</p>
</footer>

<a class="whatsapp" href="https://wa.me/905447447798">💬</a>

<script>

// canlı
setInterval(()=>{
document.getElementById("online").innerText=Math.floor(Math.random()*50)+10;
},2000);

// IMEI → WhatsApp
function sendWhatsApp(){
let imei=document.getElementById("imei").value;
let msg="Merhaba, IMEI kontrol için bilgi almak istiyorum. IMEI: "+imei;
window.open("https://wa.me/905447447798?text="+encodeURIComponent(msg));
}

// form
function formGonder(){
let ad=document.getElementById("ad").value;
let tel=document.getElementById("tel").value;

let msg="Ad:"+ad+" Tel:"+tel;
window.open("https://wa.me/905447447798?text="+encodeURIComponent(msg));
}

// ödeme
function goWhats(){
window.open("https://wa.me/905447447798");
}

// dil
const lang={
tr:{
title:"Profesyonel Teknik Servis",
btn:"Sorgula & İletişime Geç",
s1:"Android Yazılım",
s2:"iOS Servis",
s3:"Anakart Onarım",
s4:"Veri Kurtarma",
form:"Hızlı Talep",
send:"Gönder",
live:"Canlı Kullanıcı",
about:"Biz Kimiz",
aboutText:"Profesyonel teknik servis hizmeti sunuyoruz.",
pay:"Ödeme",
paybtn:"WhatsApp"
},
en:{
title:"Technical Service",
btn:"Check & Contact",
s1:"Android Software",
s2:"iOS Service",
s3:"Motherboard Repair",
s4:"Data Recovery",
form:"Quick Request",
send:"Send",
live:"Live Users",
about:"About Us",
aboutText:"We provide professional service.",
pay:"Payment",
paybtn:"WhatsApp"
}
};

function changeLang(l){
document.querySelectorAll("[data-key]").forEach(el=>{
el.innerText=lang[l][el.getAttribute("data-key")];
});
}

</script>

</body>
</html>
