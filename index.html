<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKSYMH GFI SERVICE</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}
body{background:#040404;color:white;overflow-x:hidden}

/* LOADER */
#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
#loader span{
font-size:30px;
color:#0ff;
animation:flicker 1.5s infinite;
}

/* NAV */
nav{
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 30px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{color:#0ff;text-shadow:0 0 10px #0ff}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* NEON */
.neon span{
font-size:clamp(28px,6vw,70px);
animation:flicker 2s infinite;
color:#0ff;
}
.neon span:nth-child(n){animation-delay:calc(var(--i)*0.1s)}

@keyframes flicker{
0%,18%,22%,25%,53%,57%,100%{
text-shadow:0 0 5px #0ff,0 0 30px #0ff;
}
20%,24%,55%{opacity:.3;text-shadow:none;}
}

/* BTN */
.btn{
margin-top:20px;
padding:15px 30px;
background:#0ff;
border:none;
border-radius:30px;
cursor:pointer;
}

/* SECTION */
.section{
padding:80px 20px;
text-align:center;
opacity:0;
transform:translateY(50px);
transition:1s;
}
.section.show{
opacity:1;
transform:translateY(0);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
}

/* COMMENTS */
.comment-box input{
padding:10px;
width:60%;
margin-top:10px;
}
.comment{
background:#111;
padding:15px;
margin-top:10px;
border-radius:10px;
}

/* FLOAT */
.float{
position:fixed;
bottom:20px;
right:20px;
display:flex;
flex-direction:column;
gap:10px;
}
.float div{
background:#0ff;
padding:12px;
border-radius:50%;
cursor:pointer;
}

/* BG */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(#0ff2 1px,transparent 1px);
background-size:50px 50px;
animation:bg 10s linear infinite;
z-index:-1;
}
@keyframes bg{
from{transform:translateY(0)}
to{transform:translateY(50px)}
}

footer{text-align:center;padding:30px;color:#777}
</style>

</head>

<body>

<div id="loader"><span>Yükleniyor...</span></div>

<nav>
<div class="logo">AKSYMH GFI SERVICE</div>
</nav>

<section class="hero">

<h1 class="neon">
<span style="--i:1">A</span><span style="--i:2">K</span><span style="--i:3">S</span>
<span style="--i:4">Y</span><span style="--i:5">M</span><span style="--i:6">H</span>
<span style="--i:7"> </span>
<span style="--i:8">G</span><span style="--i:9">F</span><span style="--i:10">I</span>
<span style="--i:11"> </span>
<span style="--i:12">S</span><span style="--i:13">E</span><span style="--i:14">R</span>
<span style="--i:15">V</span><span style="--i:16">I</span><span style="--i:17">C</span>
<span style="--i:18">E</span>
</h1>

<button class="btn" onclick="wa()">WhatsApp</button>
<button class="btn" onclick="call()">Ara</button>

</section>

<section class="section">
<h2>Hizmetler</h2>
<div class="grid">
<div class="card">Android</div>
<div class="card">iOS</div>
<div class="card">FRP</div>
<div class="card">Bootloop</div>
</div>
</section>

<section class="section">
<h2>Yorum Ekle</h2>

<div class="comment-box">
<input id="commentInput" placeholder="Yorum yaz">
<button class="btn" onclick="addComment()">Ekle</button>
</div>

<div id="comments"></div>

</section>

<footer>© 2026 AKSYMH</footer>

<div class="float">
<div onclick="wa()">💬</div>
<div onclick="call()">📞</div>
</div>

<script>

/* LOADER */
window.onload=()=>setTimeout(()=>document.getElementById("loader").style.display="none",1000)

/* SCROLL ANIM */
const sections=document.querySelectorAll(".section");
window.addEventListener("scroll",()=>{
sections.forEach(sec=>{
const top=sec.getBoundingClientRect().top;
if(top<window.innerHeight-100){
sec.classList.add("show");
}
})
})

/* WHATSAPP */
function wa(){
window.open("https://wa.me/905XXXXXXXXX","_blank");
}

/* CALL */
function call(){
window.open("tel:05XXXXXXXXX");
}

/* COMMENTS SAVE */
function addComment(){
let input=document.getElementById("commentInput");
let comment=input.value;

if(comment==="") return;

let comments=JSON.parse(localStorage.getItem("yorumlar"))||[];
comments.push(comment);
localStorage.setItem("yorumlar",JSON.stringify(comments));
loadComments();
input.value="";
}

function loadComments(){
let comments=JSON.parse(localStorage.getItem("yorumlar"))||[];
let html="";
comments.forEach(c=>{
html+=`<div class="comment">${c}</div>`;
});
document.getElementById("comments").innerHTML=html;
}

loadComments();

</script>

</body>
</html>
