<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AksyMH Gfi Service</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1518770660439-4636190af475');
background-size:cover;
background-attachment:fixed;
}

header{
font-size:32px;
padding:20px;
animation:rainbow 4s infinite;
}

@keyframes rainbow{
0%{color:#00ffcc}
25%{color:#ff00ff}
50%{color:#00ffff}
75%{color:#ffff00}
100%{color:#00ffcc}
}

input,select{
padding:12px;
width:250px;
border-radius:10px;
border:none;
margin:5px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:10px;
background:#00ffcc;
cursor:pointer;
font-weight:bold;
}

.services{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.box{
margin:10px;
padding:15px;
width:220px;
border-radius:12px;
background:rgba(0,0,0,0.6);
animation:neon 2s infinite alternate;
}

@keyframes neon{
0%{box-shadow:0 0 10px #00ffcc}
50%{box-shadow:0 0 30px #ff00ff}
100%{box-shadow:0 0 50px #00ffff}
}

.section{margin-top:40px;}
.warning{color:red;font-size:12px;}

.whatsapp,.telegram,.insta{
position:fixed;
right:20px;
padding:12px;
border-radius:50%;
color:white;
}

.whatsapp{bottom:20px;background:#25D366;}
.telegram{bottom:80px;background:#0088cc;}
.insta{bottom:140px;background:#E1306C;}

.toast{
position:fixed;
top:20px;
right:20px;
background:black;
padding:10px;
border-radius:10px;
display:none;
}

/* CHAT */
.chat{
position:fixed;
bottom:20px;
left:20px;
background:black;
padding:10px;
border-radius:10px;
width:200px;
display:none;
}
</style>
</head>

<body>

<header>⚡ AKSYMH GFI SERVICE ⚡</header>

<select onchange="dil(this.value)">
<option value="tr">🇹🇷 Türkçe</option>
<option value="en">🇬🇧 English</option>
</select>

<h2 id="title">Profesyonel Teknik Servis</h2>

<!-- VIDEO -->
<div class="section">
<video width="90%" controls>
<source src="https://www.w3schools.com/html/mov_bbb.mp4">
</video>
</div>

<input id="imei" placeholder="IMEI gir">
<br>
<button onclick="check()">Sorgula</button>

<p id="result"></p>
<p class="warning">⚠️ IMEI bilgi amaçlıdır</p>

<div class="services">
<div class="box">📱 Android</div>
<div class="box">🍎 iOS</div>
<div class="box">🛠️ Anakart</div>
<div class="box">⚡ Brick</div>
<div class="box">🔓 FRP<div class="warning">Kayıp cihaz yapılmaz</div></div>
<div class="box">🔐 Kilit</div>
</div>

<div class="section">
<h2>💳 Ödeme</h2>
<button onclick="odeme()">Ödeme Yap</button>
</div>

<div class="section">
<h2>📊 Canlı</h2>
<p>👁️ Online: <span id="online">0</span></p>
</div>

<div class="section">
<h2>⭐ Yorumlar</h2>
<p>⭐⭐⭐⭐⭐ “Harika”</p>
<p>⭐⭐⭐⭐⭐ “Çok iyi”</p>
<p>👍 10.000+ Beğeni</p>
</div>

<!-- CHAT -->
<div class="chat" id="chat">
<p>💬 Yardım ister misin?</p>
<button onclick="window.open('https://wa.me/905447447798')">Yaz</button>
</div>

<!-- BUTONLAR -->
<a class="whatsapp" href="https://wa.me/905447447798">💬</a>
<a class="telegram" href="#">📲</a>
<a class="insta" href="#">📸</a>

<div class="toast" id="toast"></div>

<script>

// IMEI
function check(){
let imei=document.getElementById("imei").value;
if(!imei||imei.length!==15){
document.getElementById("result").innerHTML="❌ Hatalı";
return;
}
document.getElementById("result").innerHTML="🔒 Kontrol edildi";
}

// ONLINE
setInterval(()=>{
document.getElementById("online").innerText=Math.floor(Math.random()*50)+10;
},2000);

// TOAST
let names=["Ahmet","Mehmet","Ali"];
setInterval(()=>{
let t=document.getElementById("toast");
t.innerHTML="🔥 "+names[Math.random()*names.length|0]+" işlem yaptı!";
t.style.display="block";
setTimeout(()=>t.style.display="none",3000);
},5000);

// CHAT
setTimeout(()=>{
document.getElementById("chat").style.display="block";
},5000);

// DİL
function dil(d){
if(d=="en"){
document.getElementById("title").innerText="Technical Service";
}else{
document.getElementById("title").innerText="Profesyonel Teknik Servis";
}
}

// ÖDEME
function odeme(){
alert("Ödeme için WhatsApp'tan iletişime geçin");
}

// NOTİFİKASYON
setInterval(()=>{
if(Notification.permission==="granted"){
new Notification("Yeni müşteri siteye girdi!");
}
},10000);

if(Notification.permission!=="granted"){
Notification.requestPermission();
}

</script>

</body>
</html>
