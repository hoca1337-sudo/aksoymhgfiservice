<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AksyMH Gfi Service</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
text-align:center;
}

/* GRID */
.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
padding:10px;
}

/* BOX */
.box{
background:#111827;
margin:10px;
padding:20px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.box:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ffff;
}

/* PAGE */
.page{display:none;}
.active{display:block;}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}
</style>
</head>

<body>

<h1>AKSYMH GFI SERVICE</h1>

<!-- ANA SAYFA -->
<div id="home" class="page active">

<div class="services">
<div class="box">Android</div>
<div class="box">iOS</div>
<div class="box">Şebeke</div>

<div class="box" onclick="openPage('cpid')">Samsung CPID</div>
<div class="box" onclick="openPage('frp')">Remote FRP</div>
<div class="box" onclick="openPage('kg')">KG Service</div>
</div>

</div>

<!-- CPID -->
<div id="cpid" class="page">

<button onclick="goHome()">⬅ Geri</button>

<script>

function openPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function goHome(){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("home").classList.add("active");
}

</script>

</body>
</html>
