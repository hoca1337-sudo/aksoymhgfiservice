<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKSYMH GFI SERVICE</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* HERO */
.hero{
padding:100px 20px;
text-align:center;
background:linear-gradient(180deg,#000,#111);
}

.hero h1{
font-size:40px;
color:#0ff;
}

.hero p{
color:#aaa;
margin-top:10px;
}

.btn{
margin-top:20px;
padding:15px 30px;
background:#0ff;
border:none;
border-radius:30px;
cursor:pointer;
}

/* SERVICES */
.services{
padding:60px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
}

/* TRUST */
.trust{
padding:60px 20px;
text-align:center;
background:#080808;
}

/* CTA */
.cta{
padding:60px;
text-align:center;
background:#0ff;
color:black;
}

/* FLOAT BUTTON */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
cursor:pointer;
}
</style>

</head>

<body>

<section class="hero">
<h1>AKSYMH GFI SERVICE</h1>
<p>Profesyonel Telefon Tamir ve Yazılım Hizmeti</p>
<button class="btn" onclick="wa()">WhatsApp'tan Yaz</button>

<div class="grid">

<div class="card">FRP Açma</div>

</div>
</section>

<section class="trust">
<h2>Neden Biz?</h2>
<p>✔ Hızlı işlem</p>
<p>✔ Garantili servis</p>
<p>✔ Uygun fiyat</p>
</section>

<section class="cta">
<h2>Hemen İletişime Geç</h2>
<button class="btn" onclick="wa()">WhatsApp</button>
</section>

<div class="whatsapp" onclick="wa()">
<i class="fa-brands fa-whatsapp"></i>
</div>

<script>
function wa(){
window.open("https://wa.me/905XXXXXXXXX");
}
</script>

</body>
</html>
